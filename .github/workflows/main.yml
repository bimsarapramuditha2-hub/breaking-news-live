name: 30-Minute News Sync

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Error 128 එක නැති කරන්න මේක අනිවාර්යයි
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # අලුත්ම Version එක (Warning එක Fix වේ)

      - name: Set up Python
        uses: actions/setup-python@v5 # අලුත්ම Version එක (Warning එක Fix වේ)
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser

      - name: Run Bot
        run: python bot.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Auto-Update News" || exit 0
          git push
